<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07111b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Glass Dash" />
  <title>Glass Dash</title>
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>
  <div class="bgFx" aria-hidden="true">
    <div class="blob blobA"></div>
    <div class="blob blobB"></div>
    <div class="blob blobC"></div>
    <div class="grain"></div>
    <div class="gridGlow"></div>
  </div>

  <main class="appShell">
    <header class="appTop">
      <div>
        <div class="eyebrow">dashboard</div>
        <h1>Glass Dash</h1>
      </div>
      <button id="refreshAllBtn" class="ghostBtn" type="button" aria-label="Uppdatera allt">↻</button>
    </header>

    <section id="tileGrid" class="tileGrid" aria-label="Dashboard"></section>
  </main>

  <section id="moduleOverlay" class="moduleOverlay" aria-hidden="true">
    <div class="moduleGlass">
      <header class="moduleTopbar">
        <div class="moduleTopbarLeft">
          <div id="moduleIcon" class="moduleIconWrap"></div>
          <div>
            <div id="moduleKicker" class="moduleKicker">modul</div>
            <h2 id="moduleTitle" class="moduleTitle">Titel</h2>
          </div>
        </div>
        <button id="closeModuleBtn" class="closeBtn" type="button" aria-label="Stäng">✕</button>
      </header>
      <div id="moduleBody" class="moduleBody"></div>
    </div>
  </section>

  <script src="app.js?v=2"></script>
</body>
</html>
