<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bluewhales on Tour</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">
  <div class="logo">🐋 Bluewhales on Tour</div>

  <a href="https://malarenergicup.vib.se/2026,sv/result/clubs/73836758" target="_blank" class="top-link">
    🔗 Länk Mälarenergi
  </a>
</div>

<!-- BLUEWALL PREVIEW -->
<div class="bluewall-preview" onclick="openPopup('bluewall')">
  <div id="bluewallPreview">Inga inlägg än...</div>
  <div>✏️</div>
</div>

<!-- MATCHER -->
<div id="timeline"></div>

<!-- POPUP -->
<div id="bluewall-popup" class="popup hidden">
  <div class="popup-content">
    <h2>💬 Bluewall</h2>

    <textarea id="postInput" placeholder="Skriv något..."></textarea>

    <div class="popup-buttons">
      <button onclick="addPost()">Posta</button>
      <button onclick="closePopup()">Stäng</button>
    </div>

    <div id="posts"></div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
