<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bluewhales on Tour</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">
  <button onclick="openPopup('bluewall')">💬 Bluewall</button>
  <button onclick="openPopup('rides')">🚗 Skjuts</button>
</div>

<div id="timeline"></div>

<!-- BLUEWALL -->
<div id="bluewall-popup" class="popup hidden">
  <div class="popup-content">
    <h3>Bluewall</h3>
    <textarea id="postInput" placeholder="Skriv något..."></textarea>
    <button onclick="addPost()">Posta</button>
    <div id="posts"></div>
    <button onclick="closePopup()">Stäng</button>
  </div>
</div>

<!-- SKJUTS -->
<div id="rides-popup" class="popup hidden">
  <div class="popup-content">
    <h3>Skjuts</h3>
    <div id="rides"></div>
    <button onclick="closePopup()">Stäng</button>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
